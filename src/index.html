<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="styles.css" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title data-i18n="app.name">払底枯渇</title>
		<script type="module" src="/main.js" defer></script>
	</head>

	<body>
		<div class="titlebar">
			<div class="titlebar-drag" id="titlebar-drag">
				<canvas id="titlebar-gauge" class="titlebar-gauge" width="0" height="0" aria-hidden="true" hidden></canvas>
				<span class="titlebar-title" data-i18n="app.name">払底枯渇</span>
				<span class="titlebar-version" id="titlebar-version" aria-hidden="true"></span>
				<!-- 状態行。幅が足りない時に件数だけを丸ごと落とせるよう、最終更新と件数を別々の span に分ける。 -->
				<span class="status" id="status"><span id="status-main"></span><span class="status-count" id="status-count"></span></span>
			</div>
			<div class="titlebar-controls">
				<button type="button" class="tb-btn" id="tb-min" aria-label="最小化" title="最小化" data-i18n-aria-label="titlebar.minimize" data-i18n-title="titlebar.minimize"><span class="tb-ico" aria-hidden="true">&#xE921;</span></button>
				<button type="button" class="tb-btn" id="tb-max" aria-label="最大化" title="最大化" data-i18n-aria-label="titlebar.maximize" data-i18n-title="titlebar.maximize"><span class="tb-ico" aria-hidden="true">&#xE922;</span></button>
				<button type="button" class="tb-btn tb-close" id="tb-close" aria-label="閉じる" title="閉じる" data-i18n-aria-label="titlebar.close" data-i18n-title="titlebar.close"><span class="tb-ico" aria-hidden="true">&#xE8BB;</span></button>
			</div>
		</div>
		<div class="window-body">
			<main class="app" id="view-main">
				<p id="error" class="error-banner" hidden></p>
				<!-- 利用枠パネルの差込先。中身は main.js の syncPanels が、データに現れた枠に合わせて生成する。 -->
				<section class="panels" id="panels"></section>
				<section class="charts" id="trend-section">
					<figure class="chart-card">
						<figcaption class="chart-cap">
							<span class="chart-name" data-i18n="heat.title">消費傾向 (曜日 × 時間帯)</span>
						</figcaption>
						<div id="heatmap" class="heatmap"></div>
					</figure>
				</section>
			</main>
			<main class="settings-view" id="view-settings" hidden>
				<!-- このビューの文言は locales/*.json を唯一の出所とし、applyI18n が起動時に data-i18n 要素へ流し込む。ビューは hidden で始まり、表示される前に必ず applyI18n が走るため、繋ぎ表示用の直書きテキストは持たせず空にしてある。表示が i18n 適用より先に出うるメイン画面 (view-main) は、空白のちらつきを避けるため直書きを残す。 -->
				<button id="settings-back" class="back-btn" type="button">
					<span aria-hidden="true">←</span>
					<span data-i18n="settings.back"></span>
				</button>
				<div class="settings-body">
					<h1 class="settings-title" data-i18n="settings.title"></h1>
					<div class="card">
						<div class="row">
							<div class="row-text">
								<div class="row-title" data-i18n="settings.theme.title"></div>
								<div class="row-desc" data-i18n="settings.theme.desc"></div>
							</div>
							<div class="row-control">
								<div class="segmented" id="theme-seg" role="group">
									<button type="button" data-value="system" data-i18n="settings.theme.system"></button>
									<button type="button" data-value="light" data-i18n="settings.theme.light"></button>
									<button type="button" data-value="dark" data-i18n="settings.theme.dark"></button>
								</div>
							</div>
						</div>
					</div>
					<div class="card">
						<div class="row">
							<div class="row-text">
								<div class="row-title" data-i18n="settings.language.title"></div>
								<div class="row-desc" data-i18n="settings.language.desc"></div>
							</div>
							<div class="row-control">
								<div class="segmented" id="lang-seg" role="group">
									<button type="button" data-value="system" data-i18n="settings.language.system"></button>
									<button type="button" data-value="ja" data-i18n="settings.language.ja"></button>
									<button type="button" data-value="en" data-i18n="settings.language.en"></button>
								</div>
							</div>
						</div>
					</div>
					<div class="card">
						<div class="row">
							<div class="row-text">
								<div class="row-title" data-i18n="settings.tray.title"></div>
								<div class="row-desc" data-i18n="settings.tray.desc"></div>
							</div>
							<div class="row-control">
								<div class="combo" id="tray-combo">
									<button type="button" class="combo-trigger" id="tray-combo-trigger" aria-haspopup="listbox" aria-expanded="false">
										<span class="combo-name" id="tray-combo-name"></span>
										<span class="combo-caret" aria-hidden="true"></span>
									</button>
									<ul class="combo-list" id="tray-combo-list" role="listbox" tabindex="-1" hidden>
										<li class="combo-option" role="option" data-value="burndown-session" tabindex="-1">
											<span class="combo-name" data-i18n="settings.tray.session"></span>
										</li>
										<li class="combo-option" role="option" data-value="burndown-week" tabindex="-1">
											<span class="combo-name" data-i18n="settings.tray.week"></span>
										</li>
										<li class="combo-option" role="option" data-value="burndown-week-fable" tabindex="-1">
											<span class="combo-name" data-i18n="settings.tray.weekfable"></span>
										</li>
										<li class="combo-option" role="option" data-value="gauge" tabindex="-1">
											<span class="combo-name" data-i18n="settings.tray.gauge"></span>
										</li>
									</ul>
								</div>
							</div>
						</div>
					</div>
					<div class="card">
						<div class="row">
							<div class="row-text">
								<div class="row-title" data-i18n="settings.trend.title"></div>
								<div class="row-desc" data-i18n="settings.trend.desc"></div>
							</div>
							<div class="row-control">
								<label class="switch">
									<input type="checkbox" id="trend-toggle" />
									<span class="track"></span>
								</label>
							</div>
						</div>
					</div>
					<div class="card">
						<div class="row">
							<div class="row-text">
								<div class="row-title" data-i18n="settings.heat.title"></div>
								<div class="row-desc" data-i18n="settings.heat.desc"></div>
							</div>
							<div class="row-control">
								<div class="combo" id="heat-combo">
									<button type="button" class="combo-trigger" id="heat-combo-trigger" aria-haspopup="listbox" aria-expanded="false">
										<span class="combo-name" id="heat-combo-name"></span>
										<span class="combo-swatch" id="heat-combo-swatch" aria-hidden="true"></span>
										<span class="combo-caret" aria-hidden="true"></span>
									</button>
									<ul class="combo-list" id="heat-combo-list" role="listbox" tabindex="-1" hidden></ul>
								</div>
							</div>
						</div>
					</div>
					<div class="card">
						<div class="row">
							<div class="row-text">
								<div class="row-title" data-i18n="settings.dateformat.title"></div>
								<div class="row-desc" data-i18n="settings.dateformat.desc"></div>
							</div>
							<div class="row-control">
								<div class="segmented" id="datefmt-seg" role="group">
									<button type="button" data-value="intl" data-i18n="settings.dateformat.intl"></button>
									<button type="button" data-value="jp" data-i18n="settings.dateformat.jp"></button>
								</div>
							</div>
						</div>
					</div>
					<div class="card">
						<div class="row">
							<div class="row-text">
								<div class="row-title" data-i18n="settings.autostart.title"></div>
								<div class="row-desc" data-i18n="settings.autostart.desc"></div>
							</div>
							<div class="row-control">
								<label class="switch">
									<input type="checkbox" id="autostart-toggle" />
									<span class="track"></span>
								</label>
							</div>
						</div>
					</div>
					<div class="card">
						<div class="row">
							<div class="row-text">
								<div class="row-title" data-i18n="settings.hideonblur.title"></div>
								<div class="row-desc" data-i18n="settings.hideonblur.desc"></div>
							</div>
							<div class="row-control">
								<label class="switch">
									<input type="checkbox" id="blur-hide-toggle" />
									<span class="track"></span>
								</label>
							</div>
						</div>
					</div>
					<div class="card">
						<div class="row">
							<div class="row-text">
								<div class="row-title" data-i18n="settings.errorlog.title"></div>
								<div class="row-desc" data-i18n="settings.errorlog.desc"></div>
							</div>
							<div class="row-control">
								<button type="button" id="open-error-log" data-i18n="settings.errorlog.button"></button>
							</div>
						</div>
					</div>
				</div>
			</main>
		</div>
		<!-- メインウィンドウの右クリックで開く自前のコンテキストメニュー。既定では hidden で置き、開く際に main.js が位置を当てて表示する。文言は他のビューと同じく locales/*.json を出所とし、applyI18n が data-i18n 要素へ流し込む。 -->
		<nav id="context-menu" class="context-menu" role="menu" tabindex="-1" hidden>
			<button type="button" class="ctx-item" role="menuitem" data-action="refresh">
				<span data-i18n="menu.refresh">更新</span>
				<span class="ctx-shortcut" aria-hidden="true">Ctrl+R</span>
			</button>
			<button type="button" class="ctx-item" role="menuitem" data-action="settings">
				<span data-i18n="menu.settings">設定</span>
				<span class="ctx-shortcut" aria-hidden="true">Ctrl+,</span>
			</button>
			<div class="ctx-sep" role="separator"></div>
			<button type="button" class="ctx-item" role="menuitemcheckbox" data-action="trend" aria-checked="false">
				<span class="ctx-check-mark" aria-hidden="true">&#x2713;</span>
				<span data-i18n="menu.trend">消費傾向を表示</span>
			</button>
			<!-- 消費傾向ヒートマップの配色をその場で選べるフライアウト。親項目にカーソルを合わせる(または右キー)と横に開く。選択肢は main.js が heatPaletteOptions() から生成し、名前は applyI18n が、帯は updatePaletteSubmenu が描く。 -->
			<div class="ctx-sub" role="none">
				<button type="button" class="ctx-item ctx-has-sub" role="menuitem" data-action="palette" aria-haspopup="true" aria-expanded="false">
					<span data-i18n="menu.palette">消費傾向の配色</span>
					<span class="ctx-sub-arrow" aria-hidden="true">&#x25B8;</span>
				</button>
				<div class="ctx-submenu" id="palette-submenu" role="menu" hidden></div>
			</div>
			<div class="ctx-sep" role="separator"></div>
			<button type="button" class="ctx-item" role="menuitem" data-action="close">
				<span data-i18n="menu.close">ウィンドウを閉じる</span>
				<span class="ctx-shortcut" aria-hidden="true">Ctrl+W</span>
			</button>
			<button type="button" class="ctx-item" role="menuitem" data-action="quit" data-i18n="menu.quit">終了</button>
		</nav>
	</body>
</html>
