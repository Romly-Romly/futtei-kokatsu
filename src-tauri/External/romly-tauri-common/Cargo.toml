[package]
name = "romly-tauri-common"
version = "0.1.0"
description = "複数の Tauri アプリで共有する、ウィンドウ配置の永続化とネイティブ外観の処理"
authors = ["Romly"]
edition = "2021"

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# ウィンドウのビルド番号判定とアクセント色のレジストリ読みに Win32 を直接呼ぶ。WinRT の投影を持つ windows クレートではなく windows-sys を使うのは、トレイアイコン等が依存する版と重複させず、依存を軽く保つため。
[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_Foundation", "Win32_System_SystemInformation", "Win32_System_Registry", "Wdk_System_SystemServices"] }
